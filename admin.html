<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canapix — Админка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#FBF4F2; --surface:#FFFDFB; --blush:#F4D9D6; --sage:#C3D5BD; --lilac:#DED2EA;
    --ink:#4A3F46; --ink-soft:#8A7F86; --plum:#9B7BA3; --plum-deep:#836691; --line:#EFE2E0;
    --shadow:0 12px 30px -18px rgba(120,90,110,.35); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Karla',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;overflow-x:hidden}
  .blob{position:fixed;border-radius:50%;filter:blur(65px);opacity:.5;z-index:0;pointer-events:none}
  .blob.b1{width:320px;height:320px;background:var(--blush);top:-70px;right:-50px}
  .blob.b2{width:300px;height:300px;background:var(--sage);bottom:-80px;left:-90px}
  .blob.b3{width:260px;height:260px;background:var(--lilac);top:45%;right:12%}
  .wrap{max-width:840px;margin:0 auto;padding:26px 22px;position:relative;z-index:1}

  /* ---------- LOGIN (centered) ---------- */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;position:relative;z-index:1}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:26px;padding:38px 32px 30px;
    width:100%;max-width:380px;box-shadow:0 34px 70px -26px rgba(120,90,110,.45)}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.9rem;display:flex;align-items:center;gap:11px;justify-content:center}
  .brand .dot{width:12px;height:12px;border-radius:50%;background:var(--plum)}
  .brand-sub{text-align:center;color:var(--ink-soft);font-size:.93rem;margin:7px 0 24px}
  .login-card label{display:block;font-size:.82rem;font-weight:600;margin:12px 0 5px}
  .login-card input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-family:'Karla';font-size:.98rem;color:var(--ink);background:var(--bg)}
  .login-card input:focus{outline:none;border-color:var(--plum)}
  .login-card .btn{width:100%;margin-top:20px}
  .back-link{display:block;text-align:center;margin-top:16px;color:var(--ink-soft);text-decoration:none;font-size:.88rem}
  .back-link:hover{color:var(--plum-deep)}

  /* ---------- PANEL ---------- */
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
  .panel-head h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.6rem;display:flex;align-items:center;gap:9px}
  .panel-head .dot{width:11px;height:11px;border-radius:50%;background:var(--plum)}
  .head-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:var(--shadow)}
  label{display:block;font-size:.82rem;font-weight:600;margin:12px 0 5px}
  input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;
    font-family:'Karla';font-size:.95rem;color:var(--ink);background:var(--bg);font-family:'Karla'}
  textarea{resize:vertical;min-height:80px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--plum)}
  .edit{background:none;border:1px solid var(--line);color:var(--ink-soft);border-radius:9px;padding:7px 12px;cursor:pointer;font-weight:600;margin-right:6px}
  .edit:hover{border-color:var(--plum);color:var(--plum-deep)}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .btn{background:var(--plum);color:#fff;border:none;padding:12px 22px;border-radius:99px;font-family:'Karla';
    font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .15s;text-decoration:none;display:inline-block;text-align:center}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.6;transform:none;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .msg{font-size:.88rem;margin-top:10px;min-height:18px}
  .msg.ok{color:#5a8a52} .msg.err{color:#c67b7b}
  .hidden{display:none}
  .preview{width:90px;height:90px;border-radius:12px;object-fit:cover;border:1px solid var(--line);margin-top:8px;display:none}
  .list-item{display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .list-item img{width:56px;height:56px;border-radius:12px;object-fit:cover;background:var(--blush)}
  .li-name{font-family:'Fraunces',serif;font-size:1.05rem}
  .li-meta{color:var(--ink-soft);font-size:.85rem}
  .del{background:none;border:1px solid var(--line);color:var(--ink-soft);border-radius:9px;padding:7px 12px;cursor:pointer;font-weight:600}
  .del:hover{border-color:#c67b7b;color:#c67b7b}
  .muted{color:var(--ink-soft);font-size:.9rem}
  .section-title{font-family:'Fraunces',serif;font-weight:500;font-size:1.3rem;margin:28px 0 10px}
  @media(max-width:560px){ .row3{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<!-- LOGIN -->
<div id="loginView" class="login-screen">
  <div class="login-card">
    <div class="brand"><span class="dot"></span>Canapix</div>
    <p class="brand-sub">Панель администратора</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="admin@canapix.md" autocomplete="username">
    <label for="password">Пароль</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="loginBtn" onclick="login()">Войти</button>
    <p class="msg" id="loginMsg"></p>
    <a class="back-link" href="index.html">← Вернуться на сайт</a>
  </div>
</div>

<!-- PANEL -->
<div id="panelView" class="wrap hidden">
  <div class="panel-head">
    <h1><span class="dot"></span>Canapix · Товары</h1>
    <div class="head-actions">
      <span class="muted">Вы вошли как <b id="who"></b></span>
      <a class="btn btn-ghost" href="index.html">На сайт</a>
      <button class="btn btn-ghost" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title" style="margin-top:0">Добавить товар</div>
    <div class="row3">
      <div><label for="p-ro">Название (RO)</label><input id="p-ro" placeholder="Cercei aurii"></div>
      <div><label for="p-ru">Название (RU)</label><input id="p-ru" placeholder="Золотые серьги"></div>
      <div><label for="p-en">Название (EN)</label><input id="p-en" placeholder="Gold earrings"></div>
    </div>
    <div class="row3">
      <div>
        <label for="p-cat">Категория</label>
        <select id="p-cat">
          <option value="bijuterii">Украшения</option>
          <option value="par">Аксессуары для волос</option>
          <option value="genti">Сумки и пакеты</option>
          <option value="cadou">Готовые подарки</option>
        </select>
      </div>
      <div><label for="p-price">Цена (лей)</label><input id="p-price" type="number" min="0" placeholder="180"></div>
      <div>
        <label for="p-tag">Метка</label>
        <select id="p-tag">
          <option value="">— нет —</option>
          <option value="nou">Новинка</option>
          <option value="popular">Хит</option>
        </select>
      </div>
    </div>
    <div class="row3">
      <div><label for="d-ro">Описание (RO)</label><textarea id="d-ro" rows="3" placeholder="Argint 925, lungime 3 cm."></textarea></div>
      <div><label for="d-ru">Описание (RU)</label><textarea id="d-ru" rows="3" placeholder="Серебро 925, длина 3 см."></textarea></div>
      <div><label for="d-en">Описание (EN)</label><textarea id="d-en" rows="3" placeholder="925 silver, 3 cm long."></textarea></div>
    </div>
    <label for="p-photo" id="photoLabel">Фото товара</label>
    <input id="p-photo" type="file" accept="image/*" onchange="previewPhoto()">
    <img id="preview" class="preview" alt="">
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" id="addBtn" onclick="saveProduct()">Добавить товар</button>
      <button class="btn btn-ghost hidden" id="cancelBtn" onclick="cancelEdit()">Отмена</button>
    </div>
    <p class="msg" id="addMsg"></p>
  </div>

  <div class="section-title">Товары на сайте (<span id="cnt">0</span>)</div>
  <div class="card">
    <div id="list"><p class="muted">Загрузка…</p></div>
  </div>
</div>

<script>
  /* ==== те же ключи, что и в index.html ==== */
  const SUPABASE_URL = "https://dlvdhgjdgyylksepsuas.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsdmRoZ2pkZ3l5bGtzZXBzdWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTkzODQsImV4cCI6MjA5OTA3NTM4NH0.9LLL288T3iz406_mGPdaWzJbg3ar_SsJcSGfQ5-Ceac";
  /* ========================================= */

  const $ = id => document.getElementById(id);
  let token = null;
  const catName = { bijuterii:'Украшения', par:'Аксессуары для волос', genti:'Сумки и пакеты', cadou:'Готовые подарки' };

  async function login(){
    const msg = $('loginMsg'), btn = $('loginBtn');
    const email = $('email').value.trim(), password = $('password').value;
    if(!email || !password){ msg.className='msg err'; msg.textContent='Введите email и пароль.'; return; }
    if(SUPABASE_URL.includes('XXXX')){ msg.className='msg err'; msg.textContent='Сначала впишите ключи Supabase в код.'; return; }
    btn.disabled=true; msg.className='msg'; msg.textContent='Вход…';
    try{
      const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method:'POST',
        headers:{ 'apikey':SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if(r.ok && d.access_token){
        token = d.access_token;
        $('who').textContent = email;
        $('loginView').classList.add('hidden');
        $('panelView').classList.remove('hidden');
        loadList();
      }else{
        msg.className='msg err'; msg.textContent='Неверный email или пароль.';
      }
    }catch(e){ msg.className='msg err'; msg.textContent='Ошибка сети.'; console.error(e); }
    finally{ btn.disabled=false; }
  }

  function logout(){ token=null; $('panelView').classList.add('hidden'); $('loginView').classList.remove('hidden'); $('password').value=''; }

  function previewPhoto(){
    const f = $('p-photo').files[0], img = $('preview');
    if(f){ img.src = URL.createObjectURL(f); img.style.display='block'; } else { img.style.display='none'; }
  }

  let editingId = null;

  function cancelEdit(){
    editingId = null;
    ['p-ro','p-ru','p-en','p-price','d-ro','d-ru','d-en'].forEach(id=>$(id).value='');
    $('p-photo').value=''; $('preview').style.display='none';
    $('p-cat').value='bijuterii'; $('p-tag').value='';
    $('addBtn').textContent = 'Добавить товар';
    $('photoLabel').textContent = 'Фото товара';
    $('cancelBtn').classList.add('hidden');
    $('addMsg').textContent = '';
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function editProduct(p){
    editingId = p.id;
    $('p-ro').value = p.nume_ro || '';
    $('p-ru').value = p.nume_ru || '';
    $('p-en').value = p.nume_en || '';
    $('p-cat').value = p.categorie || 'bijuterii';
    $('p-price').value = p.pret || '';
    $('p-tag').value = p.tag || '';
    $('d-ro').value = p.desc_ro || '';
    $('d-ru').value = p.desc_ru || '';
    $('d-en').value = p.desc_en || '';
    $('p-photo').value=''; $('preview').style.display='none';
    $('addBtn').textContent = 'Сохранить изменения';
    $('photoLabel').textContent = 'Фото (оставь пустым, чтобы не менять)';
    $('cancelBtn').classList.remove('hidden');
    $('addMsg').textContent = '';
    window.scrollTo({top:0,behavior:'smooth'});
  }

  async function saveProduct(){
    const msg = $('addMsg'), btn = $('addBtn');
    const ro=$('p-ro').value.trim(), ru=$('p-ru').value.trim(), en=$('p-en').value.trim();
    const cat=$('p-cat').value, price=parseFloat($('p-price').value), tag=$('p-tag').value;
    const dro=$('d-ro').value.trim(), dru=$('d-ru').value.trim(), den=$('d-en').value.trim();
    const file=$('p-photo').files[0];
    if(!ro || !price){ msg.className='msg err'; msg.textContent='Нужны минимум название (RO) и цена.'; return; }
    btn.disabled=true; msg.className='msg'; msg.textContent='Сохранение…';
    try{
      let image_url = null;
      if(file){
        msg.textContent='Загрузка фото…';
        const clean = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const path = Date.now() + '_' + clean;
        const up = await fetch(SUPABASE_URL + '/storage/v1/object/produse/' + path, {
          method:'POST',
          headers:{ 'Authorization':'Bearer '+token, 'apikey':SUPABASE_ANON_KEY, 'Content-Type':file.type, 'x-upsert':'true' },
          body: file
        });
        if(!up.ok){ const t=await up.text(); throw new Error('upload: '+t); }
        image_url = SUPABASE_URL + '/storage/v1/object/public/produse/' + path;
      }
      msg.textContent='Сохранение…';
      const payload = { nume_ro:ro, nume_ru:ru||ro, nume_en:en||ro, categorie:cat, pret:price, tag:tag, desc_ro:dro, desc_ru:dru, desc_en:den };
      if(image_url) payload.image_url = image_url;
      let r;
      if(editingId){
        r = await fetch(SUPABASE_URL + '/rest/v1/produse?id=eq.' + editingId, {
          method:'PATCH',
          headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':'Bearer '+token, 'Content-Type':'application/json', 'Prefer':'return=minimal' },
          body: JSON.stringify(payload)
        });
      }else{
        payload.activ = true;
        r = await fetch(SUPABASE_URL + '/rest/v1/produse', {
          method:'POST',
          headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':'Bearer '+token, 'Content-Type':'application/json', 'Prefer':'return=minimal' },
          body: JSON.stringify(payload)
        });
      }
      if(r.ok){
        msg.className='msg ok'; msg.textContent = editingId ? 'Товар обновлён ✓' : 'Товар добавлен ✓';
        cancelEdit();
        loadList();
      }else{ const t=await r.text(); msg.className='msg err'; msg.textContent='Ошибка сохранения.'; console.error(t); }
    }catch(e){ msg.className='msg err'; msg.textContent='Ошибка: '+e.message; console.error(e); }
    finally{ btn.disabled=false; }
  }

  async function loadList(){
    const box = $('list');
    try{
      const r = await fetch(SUPABASE_URL + '/rest/v1/produse?select=*&order=created_at.desc', {
        headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':'Bearer '+(token||SUPABASE_ANON_KEY) }
      });
      if(!r.ok){
        const t = await r.text();
        box.innerHTML = '<p class="msg err">Ошибка загрузки: '+r.status+'. '+t+'</p>';
        console.error('loadList status', r.status, t);
        return;
      }
      const rows = await r.json();
      if(!Array.isArray(rows)){
        box.innerHTML = '<p class="msg err">Неожиданный ответ от базы. См. консоль.</p>';
        console.error('loadList response is not an array:', rows);
        return;
      }
      $('cnt').textContent = rows.length;
      if(!rows.length){ box.innerHTML = '<p class="muted">Пока нет товаров. Добавьте первый выше.</p>'; return; }
      window._prodList = rows;
      box.innerHTML = rows.map((p,i) => {
        const img = p.image_url ? '<img src="'+p.image_url+'" alt="">' : '<img alt="">';
        return '<div class="list-item">'+img
          + '<div><div class="li-name">'+(p.nume_ru||p.nume_ro||'(без названия)')+'</div>'
          + '<div class="li-meta">'+(catName[p.categorie]||p.categorie||'—')+' · '+(p.pret||0)+' лей</div></div>'
          + '<div><button class="edit" onclick="editProduct(window._prodList['+i+'])">Изменить</button>'
          + '<button class="del" onclick="delProduct('+p.id+')">Удалить</button></div></div>';
      }).join('');
    }catch(e){ box.innerHTML='<p class="msg err">Не удалось загрузить список: '+e.message+'</p>'; console.error(e); }
  }

  async function delProduct(id){
    if(!confirm('Удалить этот товар?')) return;
    try{
      const r = await fetch(SUPABASE_URL + '/rest/v1/produse?id=eq.' + id, {
        method:'DELETE',
        headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':'Bearer '+token }
      });
      if(r.ok){ loadList(); } else { alert('Не удалось удалить.'); }
    }catch(e){ console.error(e); alert('Ошибка сети.'); }
  }
</script>
</body>
</html>
